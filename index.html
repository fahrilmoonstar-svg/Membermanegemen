<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FahriL Project - Member System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .landing {
            text-align: center;
            color: white;
            padding: 2rem;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-admin {
            background: #ef4444;
            color: white;
            box-shadow: 0 4px 15px rgba(239,68,68,0.3);
        }
        .btn-member {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 15px rgba(59,130,246,0.3);
        }
        .btn:hover {
            transform: translateY(-3px);
        }
        .footer {
            margin-top: 3rem;
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="landing">
        <div class="logo">⚡</div>
        <h1>FAHRIL PROJECT</h1>
        <div class="subtitle">Member Management System</div>
        <div class="buttons">
            <a href="admin.html" class="btn btn-admin">👑 Login sebagai Admin</a>
            <a href="member.html" class="btn btn-member">👤 Login sebagai Member</a>
        </div>
        <div class="footer">
            © 2024 FAHRIL PROJECT | Pilih role untuk melanjutkan
        </div>
    </div>
</body>
</html>
